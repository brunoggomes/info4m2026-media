<div class="container">
    <h1 class="text-center">Calcula a média de uma disciplina</h1>
    <div class="row">
        <div class="col col-xl-6 offset-xl-3">
            <form [formGroup]="formMedia">
                <div class="mb-3">
                    <label for="b1" class="form-label">Bim 1</label>
                    <input id="b1" class="form-control" 
                           type="number"  
                           formControlName="bim1">
                </div>

                <div class="mb-3">
                    <label for="b2" class="form-label">Bim 2</label>
                    <input id="b2" class="form-control" 
                    type="number" formControlName="bim2">
                </div>
                <div class="mb-3">
                    <label for="b3" class="form-label">Bim 3</label>
                    <input id="b3" class="form-control" type="number" 
                      formControlName="bim3">
                </div>
                <div class="mb-3">
                    <label for="b4" class="form-label">Bim 4</label>
                    <input id="b4" class="form-control" type="number"
                           formControlName="bim4">
                </div>
                <div class="mb-3">
                    <input type="button" 
                           class="btn btn-primary d-block mx-auto" 
                          value="Calcular" 
                          (click)="calcularMediaParcial()"
                          [disabled]="formMedia.invalid">
                </div>
            </form>
            <!-- Exibe se tiver média parcial (não for undefined)-->
            @if (mediaParcial) {
            <div>
                @if (mediaParcial >= 60) {
                <p class="alert alert-success">Média parcial = {{mediaParcial}}</p>
                } @else if (mediaParcial >= 10) {
                <p class="alert alert-warning">Média parcial = {{mediaParcial}}</p>
                } @else {
                <p class="alert alert-danger">Média parcial = {{mediaParcial}}
                </p>
                }
            </div>
            }
        </div>
    </div>
</div>
